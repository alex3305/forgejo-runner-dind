---
name: Docker Build, Push and Release

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    paths-ignore:
      - .forgejo/**
      - .vscode/**
      - .editorconfig
      - .gitignore
      - .yamllint
      - LICENSE
      - README.md
      - renovate.json
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push Images"
        default: true
        required: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: ⤵️ Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: docker-bake.hcl

      - name: Get Forgejo Runner version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -i "^FORGEJO_RUNNER_VERSION" docker-bake.hcl |
                    cut -d " " -f3 |
                    tr -d '"')

          echo "Resolved Forgejo Runner version - $VERSION"
          echo "semver=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 🚀 Create release
        # yamllint disable-line rule:line-length
        uses: akkuman/gitea-release-action@b8d9144f302c68610911db1aaf722708d5c02d94 # v1
        if: ${{ github.event_name == 'push' || inputs.push_images == true }}
        with:
          name: "v${{ steps.version.outputs.semver }}"
          tag_name: "v${{ steps.version.outputs.semver }}"

  build-and-push:
    name: Docker Build and Push Container to registries
    runs-on: ubuntu-latest
    needs: [release]
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      - name: ⤵️ Checkout created tag
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 🏗️ Setup qemu
        # yamllint disable-line rule:line-length
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: 🏗️ Set up Docker Buildx
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: 🔑 Docker Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔑 Docker Login to GHCR Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 🔑 Docker Login to Local Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: 1d.lol
          username: ${{ vars.LOCAL_PACKAGES_USERNAME }}
          password: ${{ secrets.LOCAL_PACKAGES_TOKEN }}

      - name: 👷 Docker Build and push latest
        # yamllint disable-line rule:line-length
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7
        with:
          push: ${{ github.event_name == 'push' || inputs.push_images == true }}
          source: "."
          targets: release
